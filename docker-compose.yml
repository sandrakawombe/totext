services:
  backend:
    build: ./backend
    container_name: totext-backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000"
    restart: unless-stopped
    networks: [totext]

  frontend:
    build: ./frontend
    container_name: totext-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks: [totext]

networks:
  totext:
    driver: bridge
